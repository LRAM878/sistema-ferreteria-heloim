{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
    <div class="card shadow">
        <div class="card-header text-white" style="background-color: #0A2342;">
            <h4 class="mb-0 fw-bold">🏭 Registrar Nuevo Proveedor</h4>
        </div>
        <div class="card-body bg-light">
            <form action="{{ url_for('proveedores.nuevo') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Nombre del Proveedor</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Distribuidora de Hierro S.A." required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" placeholder="Ej: 2200-0000">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control" placeholder="Ej: contacto@proveedor.com">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Dirección Física</label>
                        <textarea name="direccion" class="form-control" rows="3" placeholder="Escribe la dirección completa de la sucursal o bodega..."></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{{ url_for('proveedores.index') }}" class="btn btn-secondary fw-bold">Cancelar</a>
                    <button type="submit" class="btn text-white fw-bold" style="background-color: #175294;">Guardar Proveedor</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
